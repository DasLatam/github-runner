name: URL Monitor

on:
  workflow_dispatch:

concurrency:
  group: url-monitor
  cancel-in-progress: false

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run monitor
        env:
          MONITOR_PULL_URL: ${{ secrets.MONITOR_PULL_URL }}
          MONITOR_PUSH_URL: ${{ secrets.MONITOR_PUSH_URL }}
          MONITOR_SHARED_SECRET: ${{ secrets.MONITOR_SHARED_SECRET }}
          run: xvfb-run -a node monitor.js
